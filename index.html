<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Affirmations Gumball</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top: #f7ddec;
      --bg-bottom: #fcebf4;
      --ink: #5f629d;
      --lavender: #b7a1ea;
      --pixel-pink: #f0b7d4;
      --pixel-cream: #fff3c6;
      --pixel-mint: #bdeccc;
      --pixel-blue: #a9c8ff;
      --white-glow: rgba(255, 255, 255, 0.96);
      --pink-glow-a: rgba(255, 191, 217, 0.42);
      --pink-glow-b: rgba(255, 211, 232, 0.3);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.5), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(255,218,236,0.45), transparent 28%),
        linear-gradient(170deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 14px 16px 24px;
      overflow-x: hidden;
      font-family: 'Press Start 2P', monospace;
      position: relative;
      color: var(--ink);
    }

    .sparkles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .sparkle-dot {
      position: absolute;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
      filter: blur(0.2px);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1); }
    }

    .title-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 8px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .title-wrap h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.15rem, 4vw, 2rem);
      line-height: 1.35;
      color: var(--lavender);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        3px 0 0 rgba(255,255,255,0.92),
        -3px 0 0 rgba(255,255,255,0.92),
        0 3px 0 rgba(255,255,255,0.92),
        0 -3px 0 rgba(255,255,255,0.92),
        0 8px 18px rgba(255,255,255,0.28);
    }

    .machine-wrap {
      position: relative;
      z-index: 2;
      animation: float 3.8s ease-in-out infinite;
      padding: 6px 10px 2px;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .machine-wrap::before {
      content: "";
      position: absolute;
      inset: 10% 8% 8%;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--pink-glow-a) 0%, var(--pink-glow-b) 42%, transparent 72%);
      filter: blur(26px);
      transform: scale(1.04);
      z-index: -1;
      pointer-events: none;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-13px); }
    }

    .machine-container {
      position: relative;
      display: inline-block;
      isolation: isolate;
    }
    .machine-img {
      display: block;
      width: 240px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        drop-shadow(0 0 18px rgba(255, 206, 225, 0.7))
        drop-shadow(0 0 34px rgba(255, 225, 235, 0.55));
      user-select: none;
    }
    .machine-img.pressed {
      animation: pressAnim 0.22s ease forwards;
    }
    @keyframes pressAnim {
      0% { transform: scale(1); }
      40% { transform: scale(0.96, 1.02); }
      100% { transform: scale(1); }
    }

    .click-zone {
      position: absolute;
      left: 39%;
      width: 23%;
      top: 56%;
      height: 15%;
      cursor: pointer;
      z-index: 12;
      border-radius: 4px;
      background: transparent;
      touch-action: manipulation;
    }
    .click-zone:active { opacity: 0.7; }

    .click-hint {
      position: absolute;
      right: -36px;
      top: 58%;
      display: flex;
      align-items: center;
      gap: 3px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
    }
    .click-hint-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      font-weight: 700;
      color: #c39cf2;
      text-shadow:
        2px 0 0 rgba(255,255,255,0.85),
        -2px 0 0 rgba(255,255,255,0.85),
        0 2px 0 rgba(255,255,255,0.85),
        0 -2px 0 rgba(255,255,255,0.85);
      opacity: 0.95;
    }

    #dispensed-gumball {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      z-index: 120;
      opacity: 0;
      pointer-events: none;
      transform: translateY(0) scale(0.9);
      box-shadow:
        inset -2px -2px 0 rgba(0,0,0,0.08),
        0 10px 16px rgba(120, 92, 130, 0.18);
      image-rendering: pixelated;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    #dispensed-gumball.ready {
      pointer-events: auto;
      cursor: pointer;
      outline: 2px solid rgba(255, 255, 255, 0.8);
      outline-offset: 2px;
    }
    #dispensed-gumball.falling {
      animation: gumDrop 0.78s cubic-bezier(0.2, 0.85, 0.2, 1) forwards;
    }
    #dispensed-gumball.clicked {
      animation: gumPulse 0.35s ease forwards;
    }
    @keyframes gumDrop {
      0% { opacity: 1; transform: translateY(-8px) scale(0.88); }
      68% { opacity: 1; transform: translateY(62px) scale(1); }
      82% { opacity: 1; transform: translateY(52px) scale(1.02); }
      100% { opacity: 1; transform: translateY(56px) scale(1); }
    }
    @keyframes gumPulse {
      0% { transform: translateY(56px) scale(1); opacity: 1; }
      60% { transform: translateY(56px) scale(1.22); opacity: 1; }
      100% { transform: translateY(56px) scale(1); opacity: 1; }
    }

    #affirmation {
      position: relative;
      z-index: 10;
      margin-top: -18px;
      max-width: 420px;
      width: 100%;
      min-height: 48px;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.72rem, 2.6vw, 0.98rem);
      font-weight: 700;
      line-height: 1.55;
      color: var(--ink);
      text-shadow:
        2px 0 0 rgba(255,255,255,0.94),
        -2px 0 0 rgba(255,255,255,0.94),
        0 2px 0 rgba(255,255,255,0.94),
        0 -2px 0 rgba(255,255,255,0.94),
        0 0 12px rgba(255, 245, 255, 0.55),
        0 8px 18px rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      transition: opacity 0.9s ease, transform 0.9s ease, text-shadow 0.9s ease;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      align-content: flex-start;
    }
    #affirmation.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      text-shadow:
        2px 0 0 rgba(255,255,255,0.94),
        -2px 0 0 rgba(255,255,255,0.94),
        0 2px 0 rgba(255,255,255,0.94),
        0 -2px 0 rgba(255,255,255,0.94),
        0 0 18px rgba(255, 245, 255, 0.78),
        0 0 28px rgba(208, 191, 255, 0.32),
        0 8px 18px rgba(255,255,255,0.3);
    }
    .affirmation-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) scale(0.94);
      margin-right: 0.38em;
      animation: wordBloom 0.42s ease forwards;
    }
    @keyframes wordBloom {
      0% { opacity: 0; transform: translateY(10px) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .spark {
      position: fixed;
      width: 9px;
      height: 9px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 200;
      animation: sparkFly 0.85s steps(10, end) forwards;
    }
    @keyframes sparkFly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx),var(--sy)) scale(0); opacity: 0; }
    }

    @media (max-width: 620px) {
      .machine-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .machine-wrap::before {
        inset: 14% 4% 12%;
      }
      body {
        padding: 10px 12px 18px;
      }
      .title-wrap {
        margin-bottom: 4px;
      }
      #affirmation {
        margin-top: 6px;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles-bg" id="bg-sparkles"></div>

  <div class="title-wrap">
    <h1>Affirmations Gumball</h1>
  </div>

  <div class="machine-wrap">
    <div class="machine-container" id="machine-container">
      <img
        id="machine-img"
        class="machine-img"
        src="./machine.png"
        alt="Pixel art gumball machine"
        draggable="false"
      />

      <div class="click-zone" id="click-zone" aria-label="Dispense gumball"></div>
      <div class="click-hint" aria-hidden="true">
        <svg width="48" height="30" viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M46 7 C36 3, 17 6, 7 19"
                stroke="#b070c8"
                stroke-width="1.8"
                stroke-dasharray="2.6 3.2"
                stroke-linecap="round"
                fill="none"/>
          <polyline points="3,14 7,20 13,16"
                    stroke="#b070c8"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    fill="none"/>
        </svg>
        <span class="click-hint-label">click</span>
      </div>
      <div id="dispensed-gumball" aria-label="Gumball"></div>
    </div>
  </div>

  <div id="affirmation" aria-live="polite"></div>

  <script>
    const affirmations = [
      "you’re allowed to rest without earning it",
      "you’re doing better than you think",
      "it’s okay to not have everything figured out",
      "you are safe to feel your feelings",
      "small steps are still progress",
      "you deserve softness and kindness",
      "you’re not behind, you’re on your own timeline",
      "it’s okay to outgrow people and places",
      "you are enough even on your worst days",
      "healing is not linear, and that’s okay",
      "you’re allowed to take up space",
      "you don’t have to be perfect to be loved",
      "your effort matters, even if no one sees it",
      "you are worthy of gentle love",
      "it’s okay to start again as many times as you need",
      "being soft is not the same as being weak",
      "your feelings are valid, always",
      "rest is productive",
      "you are not your mistakes",
      "it’s okay to ask for help",
      "you are loved more than you know",
      "your pace is the right pace for you",
      "it’s okay to have a slow day",
      "you are exactly where you need to be",
      "kindness starts with how you talk to yourself",
      "you’ve survived 100% of your hard days so far",
      "you are allowed to change your mind",
      "your sensitivity is a superpower",
      "you don’t owe anyone constant availability",
      "you are growing, even when it doesn’t feel like it"
    ];

    const sparkColors = ['#f9b8d0', '#d9aaee', '#b2f0d8', '#f9e97e', '#aad4f5', '#ffd4b3'];
    const gumColors = ['#f9b8d0', '#d9aaee', '#b2f0d8', '#aad4f5', '#f9e97e', '#ffd4b3', '#c9a0e8', '#a8e6cf'];

    const bgEl = document.getElementById('bg-sparkles');
    const clickZone = document.getElementById('click-zone');
    const machineImg = document.getElementById('machine-img');
    const gumball = document.getElementById('dispensed-gumball');
    const affirmationEl = document.getElementById('affirmation');

    let isDispensing = false;
    let lastAffirmation = '';
    let currentAffirmation = '';
    let revealTimer = null;

    for (let i = 0; i < 34; i++) {
      const dot = document.createElement('div');
      dot.className = 'sparkle-dot';
      const s = Math.random() * 9 + 5;
      dot.style.cssText = `width:${s}px;height:${s}px;background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};left:${Math.random() * 100}%;top:${Math.random() * 100}%;--dur:${(Math.random() * 3 + 2).toFixed(1)}s;--delay:${(Math.random() * 4).toFixed(1)}s;`;
      bgEl.appendChild(dot);
    }

    function pickAffirmation() {
      let next;
      do {
        next = affirmations[Math.floor(Math.random() * affirmations.length)];
      } while (next === lastAffirmation && affirmations.length > 1);
      lastAffirmation = next;
      return next;
    }

    function emitSparks(x, y, count = 14) {
      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        const angle = (i / count) * Math.PI * 2;
        const dist = Math.random() * 70 + 26;
        spark.style.cssText = `left:${x}px;top:${y}px;background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};--sx:${(Math.cos(angle) * dist).toFixed(1)}px;--sy:${(Math.sin(angle) * dist).toFixed(1)}px;`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 900);
      }
    }

    function playPopSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        filter.type = 'lowpass';
        filter.frequency.value = 1300;
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(420, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(260, ctx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.24);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.24);
      } catch (error) {}
    }

    function playSparkleSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const master = ctx.createGain();
        master.gain.value = 0.08;
        master.connect(ctx.destination);

        [0, 0.06, 0.12].forEach((delay, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          const start = ctx.currentTime + delay;
          const base = 900 + index * 220;
          osc.frequency.setValueAtTime(base, start);
          osc.frequency.exponentialRampToValueAtTime(base * 1.35, start + 0.16);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.55, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.2);
          osc.connect(gain);
          gain.connect(master);
          osc.start(start);
          osc.stop(start + 0.22);
        });
      } catch (error) {}
    }

    function clearAffirmation() {
      if (revealTimer) {
        clearTimeout(revealTimer);
        revealTimer = null;
      }
      affirmationEl.textContent = '';
      affirmationEl.classList.remove('visible');
    }

    function revealAffirmationWords(text) {
      clearAffirmation();
      const fragment = document.createDocumentFragment();
      const words = text.split(' ');
      words.forEach((word, index) => {
        const span = document.createElement('span');
        span.className = 'affirmation-word';
        if (index === 0) {
          span.textContent = `“${word}`;
        } else if (index === words.length - 1) {
          span.textContent = `${word}”`;
        } else {
          span.textContent = word;
        }
        span.style.animationDelay = `${index * 0.18}s`;
        fragment.appendChild(span);
      });
      affirmationEl.appendChild(fragment);
      affirmationEl.classList.add('visible');
      revealTimer = setTimeout(() => {
        if (!affirmationEl.textContent.trim()) {
          affirmationEl.textContent = `“${text}”`;
          affirmationEl.classList.add('visible');
        }
      }, 80);
    }

    function positionGumball() {
      const x = machineImg.offsetWidth * 0.48;
      const y = machineImg.offsetHeight * 0.7;
      gumball.style.left = `${x - 11}px`;
      gumball.style.top = `${y}px`;
    }

    function resetGumball() {
      gumball.className = '';
      gumball.style.opacity = '0';
      gumball.style.pointerEvents = 'none';
      gumball.style.transform = 'translateY(0) scale(0.9)';
    }

    clickZone.addEventListener('click', () => {
      if (isDispensing) return;

      isDispensing = true;
      currentAffirmation = pickAffirmation();
      clearAffirmation();

      machineImg.classList.remove('pressed');
      void machineImg.offsetWidth;
      machineImg.classList.add('pressed');
      setTimeout(() => machineImg.classList.remove('pressed'), 220);

      playPopSound();
      positionGumball();
      gumball.style.background = gumColors[Math.floor(Math.random() * gumColors.length)];
      gumball.className = '';
      gumball.style.opacity = '1';
      gumball.style.transform = 'translateY(0) scale(0.9)';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          gumball.classList.add('falling');
        });
      });

      setTimeout(() => {
        gumball.className = 'ready';
        gumball.style.opacity = '1';
        gumball.style.transform = 'translateY(56px) scale(1)';
        playSparkleSound();
        const rect = gumball.getBoundingClientRect();
        emitSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 18);
        revealTimer = setTimeout(() => {
          revealAffirmationWords(currentAffirmation);
        }, 120);
        isDispensing = false;
      }, 820);
    });

    gumball.addEventListener('click', () => {
      if (isDispensing) return;

      playSparkleSound();
      const rect = gumball.getBoundingClientRect();
      emitSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 12);
      gumball.className = 'clicked';

      setTimeout(() => {
        gumball.className = 'ready';
        gumball.style.transform = 'translateY(56px) scale(1)';
      }, 360);
    });

    window.addEventListener('resize', () => {
      if (gumball.style.opacity !== '0') {
        positionGumball();
        if (gumball.classList.contains('ready') || gumball.classList.contains('clicked')) {
          gumball.style.transform = 'translateY(56px) scale(1)';
        }
      }
    });

    if (machineImg.complete) {
      positionGumball();
    } else {
      machineImg.addEventListener('load', positionGumball, { once: true });
    }

    resetGumball();
  </script>
</body>
</html>
