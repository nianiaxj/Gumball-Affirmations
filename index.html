<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Affirmations Gumball</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-top: #f7ddec;
      --bg-bottom: #fcebf4;
      --ink: #5f629d;
      --lavender: #b7a1ea;
      --pink-glow-a: rgba(255, 191, 217, 0.42);
      --pink-glow-b: rgba(255, 211, 232, 0.3);
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.5), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(255,218,236,0.45), transparent 28%),
        linear-gradient(170deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 14px 16px 24px;
      overflow-x: hidden;
      font-family: 'Press Start 2P', monospace;
      position: relative;
      color: var(--ink);
    }
    .sparkles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .sparkle-dot {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1); }
    }
    .title-wrap {
      position: relative; z-index: 2; text-align: center; margin-bottom: 8px; width: 100%; display: flex; justify-content: center;
    }
    .title-wrap h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.15rem, 4vw, 2rem);
      line-height: 1.35;
      color: var(--lavender);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        3px 0 0 rgba(255,255,255,0.92),
        -3px 0 0 rgba(255,255,255,0.92),
        0 3px 0 rgba(255,255,255,0.92),
        0 -3px 0 rgba(255,255,255,0.92),
        0 8px 18px rgba(255,255,255,0.28);
    }
    .machine-wrap {
      position: relative; z-index: 2; animation: float 3.8s ease-in-out infinite; padding: 6px 10px 2px; display: flex; justify-content: center; width: 100%;
    }
    .machine-wrap::before {
      content: ""; position: absolute; inset: 10% 8% 8%; border-radius: 50%;
      background: radial-gradient(circle, var(--pink-glow-a) 0%, var(--pink-glow-b) 42%, transparent 72%);
      filter: blur(26px); transform: scale(1.04); z-index: -1; pointer-events: none;
    }
    @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-13px); } }
    .machine-container { position: relative; display: inline-block; isolation: isolate; }
    .machine-img {
      display: block; width: 240px; image-rendering: pixelated; image-rendering: crisp-edges;
      filter: drop-shadow(0 0 18px rgba(255, 206, 225, 0.7)) drop-shadow(0 0 34px rgba(255, 225, 235, 0.55));
      user-select: none;
    }
    .machine-img.pressed { animation: pressAnim 0.22s ease forwards; }
    @keyframes pressAnim {
      0% { transform: scale(1); }
      40% { transform: scale(0.96, 1.02); }
      100% { transform: scale(1); }
    }
    .click-zone {
      position: absolute; left: 39%; width: 23%; top: 56%; height: 15%; cursor: pointer; z-index: 12; border-radius: 4px; background: transparent; touch-action: manipulation;
    }
    .click-zone.disabled { pointer-events: none; }
    .click-zone:active { opacity: 0.7; }
    .click-hint {
      position: absolute; right: -36px; top: 58%; display: flex; align-items: center; gap: 3px; pointer-events: none; white-space: nowrap; z-index: 20;
    }
    .click-hint-label {
      font-family: 'Press Start 2P', monospace; font-size: 0.5rem; font-weight: 700; color: #c39cf2;
      text-shadow: 2px 0 0 rgba(255,255,255,0.85), -2px 0 0 rgba(255,255,255,0.85), 0 2px 0 rgba(255,255,255,0.85), 0 -2px 0 rgba(255,255,255,0.85);
      opacity: 0.95;
    }
    #dispensed-gumball {
      position: absolute; width: 24px; height: 24px; border-radius: 50%; z-index: 120; opacity: 0; pointer-events: none; transform: translateY(0) scale(0.9);
      box-shadow: inset -3px -3px 0 rgba(255,255,255,0.22), inset 3px 3px 0 rgba(0,0,0,0.05), 0 10px 16px rgba(120, 92, 130, 0.18);
      transition: opacity 0.2s ease;
    }
    #dispensed-gumball.falling { animation: gumDrop 0.72s cubic-bezier(0.18, 0.82, 0.2, 1) forwards; }
    #dispensed-gumball.opening { animation: gumOpen 0.34s ease-in-out forwards; }
    @keyframes gumDrop {
      0% { opacity: 1; transform: translateY(-10px) scale(0.86); }
      72% { opacity: 1; transform: translateY(58px) scale(1); }
      86% { opacity: 1; transform: translateY(48px) scale(1.03); }
      100% { opacity: 1; transform: translateY(54px) scale(1); }
    }
    @keyframes gumOpen {
      0% { transform: translateY(54px) scale(1); opacity: 1; filter: none; }
      45% { transform: translateY(54px) scale(1.28); opacity: 1; filter: brightness(1.05); }
      100% { transform: translateY(54px) scale(0.2); opacity: 0; filter: brightness(1.18); }
    }
    #affirmation {
      position: relative; z-index: 10; margin-top: -26px; max-width: 360px; width: 100%; min-height: 88px; display: flex; justify-content: center; align-items: center; pointer-events: none;
    }
    .scroll-card {
      position: relative; width: min(100%, 320px); background: linear-gradient(180deg, #ffd7ea 0%, #ffcfe3 100%); border-radius: 24px; padding: 16px 18px;
      box-shadow: 0 8px 20px rgba(209, 171, 201, 0.3), inset 0 2px 0 rgba(255,255,255,0.5);
      border: 2px solid rgba(255,255,255,0.4); transform-origin: left center; opacity: 0; transform: translateY(8px) scaleX(0.12) scaleY(0.82);
      filter: drop-shadow(0 0 0 rgba(255, 245, 255, 0));
    }
    .scroll-card.visible { animation: scrollOpen 0.78s cubic-bezier(0.2, 0.8, 0.22, 1) forwards; }
    @keyframes scrollOpen {
      0% { opacity: 0; transform: translateY(8px) scaleX(0.12) scaleY(0.82); filter: drop-shadow(0 0 0 rgba(255, 245, 255, 0)); }
      65% { opacity: 1; transform: translateY(0) scaleX(1.05) scaleY(1); filter: drop-shadow(0 0 10px rgba(255, 244, 255, 0.38)); }
      100% { opacity: 1; transform: translateY(0) scaleX(1) scaleY(1); filter: drop-shadow(0 0 14px rgba(255, 244, 255, 0.45)); }
    }
    .scroll-card::before, .scroll-card::after {
      content: ""; position: absolute; top: 18px; bottom: 18px; width: 10px; border-radius: 999px; background: linear-gradient(180deg, #f5b6d2 0%, #ef9ec5 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .scroll-card::before { left: -4px; }
    .scroll-card::after { right: -4px; }
    .scroll-text {
      position: relative; z-index: 1; font-family: 'Press Start 2P', monospace; font-size: clamp(0.68rem, 2.1vw, 0.86rem); font-weight: 700; line-height: 1.8; color: #8d74ad; text-align: center; opacity: 0; transform: translateY(8px);
      text-shadow:
        2px 0 0 rgba(255,255,255,0.9),
        -2px 0 0 rgba(255,255,255,0.9),
        0 2px 0 rgba(255,255,255,0.9),
        0 -2px 0 rgba(255,255,255,0.9),
        0 0 10px rgba(255, 250, 255, 0.45);
    }
    .scroll-card.visible .scroll-text { animation: textFadeIn 0.58s ease forwards 0.34s; }
    @keyframes textFadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    .spark {
      position: fixed; width: 9px; height: 9px; border-radius: 3px; pointer-events: none; z-index: 200; animation: sparkFly 0.85s steps(10, end) forwards;
    }
    @keyframes sparkFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--sx),var(--sy)) scale(0); opacity: 0; } }
    @media (max-width: 620px) {
      .machine-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .machine-wrap::before { inset: 14% 4% 12%; }
      body { padding: 10px 12px 18px; }
      .title-wrap { margin-bottom: 4px; }
      #affirmation { margin-top: -18px; min-height: 78px; }
    }
  </style>
</head>
<body>
  <div class="sparkles-bg" id="bg-sparkles"></div>
  <div class="title-wrap"><h1>Affirmations Gumball</h1></div>
  <div class="machine-wrap">
    <div class="machine-container" id="machine-container">
      <img id="machine-img" class="machine-img" src="./machine.png" alt="Pixel art gumball machine" draggable="false"/>
      <div class="click-zone" id="click-zone" aria-label="Dispense gumball"></div>
      <div class="click-hint" aria-hidden="true">
        <svg width="48" height="30" viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M46 7 C36 3, 17 6, 7 19" stroke="#b070c8" stroke-width="1.8" stroke-dasharray="2.6 3.2" stroke-linecap="round" fill="none"/>
          <polyline points="3,14 7,20 13,16" stroke="#b070c8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="click-hint-label">click</span>
      </div>
      <div id="dispensed-gumball" aria-hidden="true"></div>
    </div>
  </div>
  <div id="affirmation" aria-live="polite"></div>
  <script>
    const affirmations = [
      "You're allowed to rest without earning it.",
      "You're doing better than you think.",
      "It's okay to not have everything figured out.",
      "You are safe to feel your feelings.",
      "Small steps are still progress.",
      "You deserve softness and kindness.",
      "You're on your own timeline.",
      "It's okay to outgrow people and places.",
      "You are enough even on your worst days.",
      "Healing is not linear, and that's okay.",
      "You're allowed to take up space.",
      "You don't have to be perfect to be loved.",
      "Your effort matters, even if no one sees it.",
      "You are worthy of gentle love.",
      "It's okay to start again as many times as you need.",
      "Being soft is not the same as being weak.",
      "Your feelings are valid, always.",
      "Rest is productive.",
      "You are not your mistakes.",
      "It's okay to ask for help.",
      "You are loved more than you know.",
      "Your pace is the right pace for you.",
      "It's okay to have a slow day.",
      "You are exactly where you need to be.",
      "Kindness starts with how you talk to yourself.",
      "You've survived every hard day so far.",
      "You are allowed to change your mind.",
      "Your sensitivity is a superpower.",
      "You don't owe anyone constant availability.",
      "You are growing, even when it doesn't feel like it."
    ];
    const sparkColors = ['#f9b8d0', '#d9aaee', '#b2f0d8', '#f9e97e', '#aad4f5', '#ffd4b3'];
    const gumColors = ['#f9b8d0', '#d9aaee', '#b2f0d8', '#aad4f5'];
    const bgEl = document.getElementById('bg-sparkles');
    const clickZone = document.getElementById('click-zone');
    const machineImg = document.getElementById('machine-img');
    const gumball = document.getElementById('dispensed-gumball');
    const affirmationEl = document.getElementById('affirmation');
    let isDispensing = false;
    let lastAffirmation = '';
    let currentAffirmation = '';
    let revealTimer = null;
    for (let i = 0; i < 34; i++) {
      const dot = document.createElement('div');
      dot.className = 'sparkle-dot';
      const s = Math.random() * 9 + 5;
      dot.style.cssText = `width:${s}px;height:${s}px;background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};left:${Math.random() * 100}%;top:${Math.random() * 100}%;--dur:${(Math.random() * 3 + 2).toFixed(1)}s;--delay:${(Math.random() * 4).toFixed(1)}s;`;
      bgEl.appendChild(dot);
    }
    function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function pickAffirmation() {
      let next;
      do { next = affirmations[Math.floor(Math.random() * affirmations.length)]; }
      while (next === lastAffirmation && affirmations.length > 1);
      lastAffirmation = next;
      return next;
    }
    function emitSparks(x, y, count = 14) {
      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        const angle = (i / count) * Math.PI * 2;
        const dist = Math.random() * 70 + 26;
        spark.style.cssText = `left:${x}px;top:${y}px;background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};--sx:${(Math.cos(angle) * dist).toFixed(1)}px;--sy:${(Math.sin(angle) * dist).toFixed(1)}px;`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 900);
      }
    }
    function playToneSequence(steps, masterVolume = 0.25) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const master = ctx.createGain();
        master.gain.value = masterVolume;
        master.connect(ctx.destination);
        steps.forEach((step) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          const start = ctx.currentTime + (step.delay || 0);
          const end = start + step.duration;
          osc.type = step.type || 'sine';
          osc.frequency.setValueAtTime(step.from, start);
          if (step.to) osc.frequency.exponentialRampToValueAtTime(step.to, end);
          filter.type = step.filterType || 'lowpass';
          filter.frequency.value = step.filterFrequency || 1800;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(step.peak || 0.55, start + Math.min(0.03, step.duration / 3));
          gain.gain.exponentialRampToValueAtTime(0.0001, end);
          osc.connect(filter); filter.connect(gain); gain.connect(master);
          osc.start(start); osc.stop(end + 0.02);
        });
      } catch (error) {}
    }
    const clickSound = { play(volume) { playToneSequence([{ delay: 0, duration: 0.08, from: 480, to: 360, type: 'triangle', peak: 0.45, filterFrequency: 1400 }], volume); } };
    const dropSound = { play(volume) { playToneSequence([{ delay: 0, duration: 0.24, from: 240, to: 170, type: 'sine', peak: 0.38, filterFrequency: 900 }], volume); } };
    const popSound = { play(volume) { playToneSequence([{ delay: 0, duration: 0.12, from: 520, to: 220, type: 'triangle', peak: 0.68, filterFrequency: 1700 }, { delay: 0.02, duration: 0.1, from: 630, to: 270, type: 'sine', peak: 0.42, filterFrequency: 2200 }], volume); } };
    const sparkleSound = { play(volume) { playToneSequence([{ delay: 0, duration: 0.18, from: 880, to: 1120, type: 'sine', peak: 0.48, filterFrequency: 2600 }, { delay: 0.08, duration: 0.18, from: 1120, to: 1480, type: 'triangle', peak: 0.36, filterFrequency: 3000 }, { delay: 0.16, duration: 0.16, from: 980, to: 1560, type: 'sine', peak: 0.28, filterFrequency: 3200 }], volume); } };
    function playSound(sound, volume) {
      try { sound.currentTime = 0; } catch (error) {}
      if (sound && typeof sound.play === 'function') sound.play(volume);
    }
    function clearAffirmation() {
      if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
      affirmationEl.textContent = '';
    }
    function revealAffirmationScroll(text) {
      clearAffirmation();
      const scroll = document.createElement('div');
      scroll.className = 'scroll-card';
      const textEl = document.createElement('div');
      textEl.className = 'scroll-text';
      textEl.textContent = text;
      scroll.appendChild(textEl);
      affirmationEl.appendChild(scroll);
      requestAnimationFrame(() => { scroll.classList.add('visible'); });
      revealTimer = setTimeout(() => { playSound(sparkleSound, 0.2); }, 820);
    }
    function positionGumball() {
      const x = machineImg.offsetWidth * 0.48;
      const y = machineImg.offsetHeight * 0.7;
      gumball.style.left = `${x - 12}px`;
      gumball.style.top = `${y}px`;
    }
    function resetGumball() {
      gumball.className = '';
      gumball.style.opacity = '0';
      gumball.style.transform = 'translateY(0) scale(0.9)';
    }
    function pressMachine() {
      machineImg.classList.remove('pressed');
      void machineImg.offsetWidth;
      machineImg.classList.add('pressed');
      setTimeout(() => machineImg.classList.remove('pressed'), 220);
    }
    function setGumballColor() {
      const color = gumColors[Math.floor(Math.random() * gumColors.length)];
      gumball.style.background = `radial-gradient(circle at 32% 30%, rgba(255,255,255,0.55), transparent 34%), ${color}`;
    }
    async function runDispenseSequence() {
      if (isDispensing) return;
      isDispensing = true;
      clickZone.classList.add('disabled');
      currentAffirmation = pickAffirmation();
      clearAffirmation();
      resetGumball();
      pressMachine();
      playSound(clickSound, 0.24);
      await wait(360);
      positionGumball();
      setGumballColor();
      gumball.style.opacity = '1';
      gumball.style.transform = 'translateY(0) scale(0.9)';
      playSound(dropSound, 0.24);
      requestAnimationFrame(() => { requestAnimationFrame(() => { gumball.classList.add('falling'); }); });
      await wait(720);
      gumball.className = '';
      gumball.style.opacity = '1';
      gumball.style.transform = 'translateY(54px) scale(1)';
      await wait(120);
      gumball.classList.add('opening');
      playSound(popSound, 0.34);
      const rect = gumball.getBoundingClientRect();
      emitSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 16);
      await wait(200);
      revealAffirmationScroll(currentAffirmation);
      await wait(1100);
      isDispensing = false;
      clickZone.classList.remove('disabled');
    }
    clickZone.addEventListener('click', runDispenseSequence);
    window.addEventListener('resize', () => {
      if (gumball.style.opacity !== '0') {
        positionGumball();
        if (!gumball.classList.contains('falling') && !gumball.classList.contains('opening')) {
          gumball.style.transform = 'translateY(54px) scale(1)';
        }
      }
    });
    if (machineImg.complete) positionGumball();
    else machineImg.addEventListener('load', positionGumball, { once: true });
    resetGumball();
  </script>
</body>
</html>
